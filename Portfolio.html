<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #0A0908;
    --bg-2: #121110;
    --bg-3: #1A1817;
    --fg: #F5F5F0;
    --fg-dim: #A8A6A0;
    --fg-mute: #6B6965;
    --line: #232120;
    --line-2: #2E2C2A;
    --accent: #F59E0B;
    --accent-2: #EA580C;
    --radius: 18px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--fg); font-family:'Plus Jakarta Sans', system-ui, sans-serif; font-feature-settings:"ss01","cv11"; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;}
  body{ overflow-x:hidden; }
  ::selection{ background:var(--accent); color:#0A0908; }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  .mono{ font-family:'JetBrains Mono', ui-monospace, monospace; }

  /* scrollbar */
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:var(--bg); }
  ::-webkit-scrollbar-thumb{ background:#2a2826; border-radius:10px; }
  ::-webkit-scrollbar-thumb:hover{ background:#3a3835; }

  /* Reveal animation utility */
  .reveal{ opacity:0; transform:translateY(24px); transition: opacity .6s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1); }
  .reveal.in{ opacity:1; transform:none; }
  .reveal.d1{ transition-delay:.05s } .reveal.d2{ transition-delay:.12s } .reveal.d3{ transition-delay:.2s } .reveal.d4{ transition-delay:.28s } .reveal.d5{ transition-delay:.36s }

  body.no-motion .reveal{ opacity:1 !important; transform:none !important; transition:none !important; }
  body.no-motion *{ animation: none !important; transition: none !important; }

  /* Image slot styling override */
  image-slot{
    background: linear-gradient(135deg, #1a1817 25%, #15130f 25%, #15130f 50%, #1a1817 50%, #1a1817 75%, #15130f 75%);
    background-size: 14px 14px;
    border: 1px solid var(--line);
  }

  /* Modal animations */
  @keyframes fadeIn { from{ opacity:0 } to{ opacity:1 } }
  @keyframes slideUp { from{ opacity:0; transform:translateY(20px) } to{ opacity:1; transform:none } }
</style>
