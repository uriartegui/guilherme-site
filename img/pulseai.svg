<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0d0c0b"/>

  <!-- Window chrome -->
  <rect x="40" y="30" width="720" height="440" rx="12" fill="#111010" stroke="#1e1d1b" stroke-width="1"/>
  <!-- Title bar -->
  <rect x="40" y="30" width="720" height="42" rx="12" fill="#161514"/>
  <rect x="40" y="58" width="720" height="14" fill="#161514"/>
  <!-- Traffic lights -->
  <circle cx="64" cy="51" r="6" fill="#ff5f56"/>
  <circle cx="84" cy="51" r="6" fill="#ffbd2e"/>
  <circle cx="104" cy="51" r="6" fill="#27c93f"/>
  <!-- Window title -->
  <text x="400" y="56" text-anchor="middle" fill="#6b6965" font-size="12" font-family="system-ui">PulseAI — editor</text>

  <!-- Left panel: editor -->
  <rect x="52" y="84" width="430" height="374" rx="8" fill="#0f0e0d"/>
  <!-- Editor header -->
  <text x="68" y="104" fill="#6b6965" font-size="9" font-family="system-ui" letter-spacing="0.8">TEXTO ORIGINAL</text>

  <!-- Line numbers + text lines -->
  <text x="68" y="126" fill="#3a3835" font-size="10" font-family="'JetBrains Mono', monospace">1</text>
  <rect x="86" y="116" width="280" height="10" rx="3" fill="#1a1917"/>

  <text x="68" y="144" fill="#3a3835" font-size="10" font-family="'JetBrains Mono', monospace">2</text>
  <rect x="86" y="134" width="340" height="10" rx="3" fill="#1a1917"/>

  <text x="68" y="162" fill="#3a3835" font-size="10" font-family="'JetBrains Mono', monospace">3</text>
  <rect x="86" y="152" width="310" height="10" rx="3" fill="#1a1917"/>

  <text x="68" y="180" fill="#3a3835" font-size="10" font-family="'JetBrains Mono', monospace">4</text>
  <rect x="86" y="170" width="260" height="10" rx="3" fill="#1a1917"/>

  <text x="68" y="198" fill="#3a3835" font-size="10" font-family="'JetBrains Mono', monospace">5</text>

  <text x="68" y="216" fill="#3a3835" font-size="10" font-family="'JetBrains Mono', monospace">6</text>
  <rect x="86" y="206" width="320" height="10" rx="3" fill="#1a1917"/>

  <text x="68" y="234" fill="#3a3835" font-size="10" font-family="'JetBrains Mono', monospace">7</text>
  <rect x="86" y="224" width="290" height="10" rx="3" fill="#1a1917"/>

  <text x="68" y="252" fill="#3a3835" font-size="10" font-family="'JetBrains Mono', monospace">8</text>
  <rect x="86" y="242" width="350" height="10" rx="3" fill="#1a1917"/>

  <text x="68" y="270" fill="#3a3835" font-size="10" font-family="'JetBrains Mono', monospace">9</text>
  <rect x="86" y="260" width="200" height="10" rx="3" fill="#1a1917"/>

  <!-- Cursor blink line -->
  <rect x="86" y="278" width="2" height="12" fill="#f59e0b" opacity="0.8"/>

  <!-- Right panel: AI output -->
  <rect x="494" y="84" width="254" height="374" rx="8" fill="#111010" stroke="#1e1d1b" stroke-width="1"/>

  <!-- Panel header -->
  <text x="510" y="104" fill="#6b6965" font-size="9" font-family="system-ui" letter-spacing="0.8">RESULTADO IA</text>
  <!-- Active indicator -->
  <circle cx="740" cy="100" r="4" fill="#22c55e"/>

  <!-- AI output lines — highlighted style -->
  <rect x="510" y="112" width="220" height="10" rx="3" fill="#1f1c18"/>
  <rect x="510" y="128" width="195" height="10" rx="3" fill="#1f1c18"/>
  <rect x="510" y="144" width="210" height="10" rx="3" fill="#1f1c18"/>
  <rect x="510" y="160" width="170" height="10" rx="3" fill="#1f1c18"/>
  <rect x="510" y="176" width="225" height="10" rx="3" fill="#1f1c18"/>
  <rect x="510" y="192" width="185" height="10" rx="3" fill="#1f1c18"/>
  <rect x="510" y="208" width="200" height="10" rx="3" fill="#1f1c18"/>

  <!-- Diff: inserted lines (green tint) -->
  <rect x="506" y="224" width="3" height="10" rx="1" fill="#22c55e"/>
  <rect x="514" y="224" width="215" height="10" rx="3" fill="rgba(34,197,94,.08)"/>
  <rect x="506" y="240" width="3" height="10" rx="1" fill="#22c55e"/>
  <rect x="514" y="240" width="180" height="10" rx="3" fill="rgba(34,197,94,.08)"/>

  <!-- Diff: removed lines (red tint) -->
  <rect x="506" y="258" width="3" height="10" rx="1" fill="#ef4444"/>
  <rect x="514" y="258" width="205" height="10" rx="3" fill="rgba(239,68,68,.07)"/>

  <rect x="510" y="276" width="190" height="10" rx="3" fill="#1f1c18"/>
  <rect x="510" y="292" width="215" height="10" rx="3" fill="#1f1c18"/>

  <!-- Action buttons -->
  <rect x="494" y="376" width="254" height="1" fill="#1e1d1b"/>

  <!-- Button row -->
  <rect x="504" y="385" width="54" height="24" rx="6" fill="#1f1d1b" stroke="#2e2c2a" stroke-width="1"/>
  <text x="531" y="401" text-anchor="middle" fill="#a8a6a0" font-size="9" font-family="system-ui">✦ melhorar</text>

  <rect x="564" y="385" width="46" height="24" rx="6" fill="#1f1d1b" stroke="#2e2c2a" stroke-width="1"/>
  <text x="587" y="401" text-anchor="middle" fill="#a8a6a0" font-size="9" font-family="system-ui">resumir</text>

  <rect x="616" y="385" width="46" height="24" rx="6" fill="#1f1d1b" stroke="#2e2c2a" stroke-width="1"/>
  <text x="639" y="401" text-anchor="middle" fill="#a8a6a0" font-size="9" font-family="system-ui">expandir</text>

  <!-- Highlighted active button -->
  <rect x="668" y="385" width="68" height="24" rx="6" fill="rgba(245,158,11,.12)" stroke="rgba(245,158,11,.3)" stroke-width="1"/>
  <text x="702" y="401" text-anchor="middle" fill="#f59e0b" font-size="9" font-family="system-ui">✦ traduzir</text>

  <!-- Copy button -->
  <rect x="494" y="416" width="254" height="30" rx="0" fill="#161514"/>
  <rect x="494" y="416" width="254" height="30" rx="0" fill="#161514"/>
  <rect x="494" y="438" width="254" height="8" rx="0" fill="#161514"/>
  <rect x="494" y="438" width="254" height="8" rx="8" fill="#161514"/>
  <text x="621" y="436" text-anchor="middle" fill="#6b6965" font-size="9" font-family="system-ui">copiar resultado</text>

  <!-- Bottom toolbar for editor -->
  <rect x="52" y="420" width="430" height="38" rx="0" fill="#0f0e0d"/>
  <rect x="52" y="420" width="430" height="38" rx="8" fill="#0f0e0d"/>
  <rect x="52" y="420" width="430" height="22" fill="#0f0e0d"/>
  <!-- Token count -->
  <text x="68" y="444" fill="#3a3835" font-size="9" font-family="system-ui">247 palavras · 1.2k tokens</text>
  <!-- Undo -->
  <rect x="398" y="426" width="72" height="22" rx="5" fill="#1a1917" stroke="#1e1d1b" stroke-width="1"/>
  <text x="434" y="441" text-anchor="middle" fill="#6b6965" font-size="9" font-family="system-ui">↩ desfazer</text>
</svg>
