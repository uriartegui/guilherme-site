<svg xmlns="http://www.w3.org/2000/svg" width="600" height="500" viewBox="0 0 600 500">
  <rect width="600" height="500" fill="#0d0c0b"/>

  <!-- Phone shell -->
  <rect x="175" y="20" width="250" height="460" rx="36" fill="#1c1b1a" stroke="#2e2c2a" stroke-width="2"/>
  <rect x="185" y="30" width="230" height="440" rx="28" fill="#0d0c0b"/>

  <!-- Status bar -->
  <rect x="185" y="30" width="230" height="32" rx="28" fill="#0d0c0b"/>
  <rect x="185" y="50" width="230" height="12" fill="#0d0c0b"/>
  <text x="202" y="50" fill="#e5e5e0" font-size="10" font-weight="600" font-family="system-ui">9:41</text>
  <rect x="370" y="40" width="14" height="7" rx="2" fill="none" stroke="#e5e5e0" stroke-width="1.2"/>
  <rect x="371" y="41" width="10" height="5" rx="1" fill="#e5e5e0"/>

  <!-- Balance card -->
  <rect x="185" y="62" width="230" height="90" fill="#1f1408"/>
  <text x="200" y="82" fill="rgba(245,158,11,.65)" font-size="8" font-family="system-ui" letter-spacing="0.8">SALDO TOTAL · MAIO</text>
  <text x="200" y="108" fill="#e5e5e0" font-size="26" font-weight="800" font-family="system-ui">R$ 4.836,70</text>
  <text x="200" y="128" fill="#22c55e" font-size="11" font-weight="600" font-family="system-ui">↑ R$ 5.200,00</text>
  <text x="300" y="128" fill="#ef4444" font-size="11" font-weight="600" font-family="system-ui">↓ R$ 363,30</text>

  <!-- Transactions header -->
  <text x="200" y="170" fill="#6b6965" font-size="8" font-family="system-ui" letter-spacing="0.8">TRANSAÇÕES RECENTES</text>

