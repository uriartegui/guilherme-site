  <rect x="200" y="178" width="28" height="28" rx="8" fill="#1a1917"/>
  <text x="214" y="197" text-anchor="middle" font-size="14">🛒</text>
  <text x="238" y="191" fill="#e5e5e0" font-size="11" font-weight="500" font-family="system-ui">Mercado Extra</text>
  <text x="238" y="204" fill="#6b6965" font-size="9" font-family="system-ui">hoje</text>
  <text x="385" y="193" text-anchor="end" fill="#e5e5e0" font-size="11" font-weight="600" font-family="system-ui">−R$ 180,50</text>

  <rect x="200" y="215" width="28" height="28" rx="8" fill="#1a1917"/>
  <text x="214" y="234" text-anchor="middle" font-size="14">💡</text>
  <text x="238" y="228" fill="#e5e5e0" font-size="11" font-weight="500" font-family="system-ui">Conta de luz</text>
  <text x="238" y="241" fill="#6b6965" font-size="9" font-family="system-ui">ontem</text>
  <text x="385" y="230" text-anchor="end" fill="#e5e5e0" font-size="11" font-weight="600" font-family="system-ui">−R$ 95,00</text>

  <rect x="200" y="252" width="28" height="28" rx="8" fill="#1a1917"/>
  <text x="214" y="271" text-anchor="middle" font-size="14">💰</text>
  <text x="238" y="265" fill="#e5e5e0" font-size="11" font-weight="500" font-family="system-ui">Salário</text>
  <text x="238" y="278" fill="#6b6965" font-size="9" font-family="system-ui">01/05</text>
  <text x="385" y="267" text-anchor="end" fill="#22c55e" font-size="11" font-weight="600" font-family="system-ui">+R$ 5.200,00</text>

  <rect x="200" y="289" width="28" height="28" rx="8" fill="#1a1917"/>
  <text x="214" y="308" text-anchor="middle" font-size="14">🍕</text>
  <text x="238" y="302" fill="#e5e5e0" font-size="11" font-weight="500" font-family="system-ui">iFood</text>
  <text x="238" y="315" fill="#6b6965" font-size="9" font-family="system-ui">30/04</text>
  <text x="385" y="304" text-anchor="end" fill="#e5e5e0" font-size="11" font-weight="600" font-family="system-ui">−R$ 42,90</text>

  <rect x="200" y="326" width="28" height="28" rx="8" fill="#1a1917"/>
  <text x="214" y="345" text-anchor="middle" font-size="14">🚗</text>
  <text x="238" y="339" fill="#e5e5e0" font-size="11" font-weight="500" font-family="system-ui">Uber</text>
  <text x="238" y="352" fill="#6b6965" font-size="9" font-family="system-ui">29/04</text>
  <text x="385" y="341" text-anchor="end" fill="#e5e5e0" font-size="11" font-weight="600" font-family="system-ui">−R$ 23,00</text>

  <!-- FAB -->
  <circle cx="375" cy="435" r="22" fill="#f59e0b"/>
  <text x="375" y="443" text-anchor="middle" fill="#0a0908" font-size="22" font-weight="700" font-family="system-ui">+</text>

  <!-- Home indicator -->
  <rect x="265" y="458" width="70" height="3" rx="2" fill="#3a3a3a"/>
