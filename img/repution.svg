  <text x="458" y="290" fill="#e5e5e0" font-size="12" font-weight="600" font-family="system-ui">Rafael Mendes</text>
  <text x="458" y="306" fill="#f59e0b" font-size="12">★★★☆☆</text>
  <text x="680" y="290" fill="#6b6965" font-size="10" font-family="system-ui">iFood · 5h atrás</text>
  <text x="424" y="328" fill="#a8a6a0" font-size="12" font-family="system-ui">"Comida boa mas a entrega demorou</text>
