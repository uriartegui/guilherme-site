  <text x="24" y="33" fill="#e5e5e0" font-size="15" font-weight="700" font-family="system-ui">Repution</text>
  <rect x="600" y="14" width="100" height="26" rx="6" fill="rgba(34,197,94,0.1)" stroke="rgba(34,197,94,0.25)" stroke-width="1"/>
  <circle cx="616" cy="27" r="4" fill="#22c55e"/>
  <text x="652" y="31" text-anchor="middle" fill="#22c55e" font-size="11" font-family="system-ui">ao vivo</text>
