  <rect x="424" y="354" width="340" height="1" fill="#1e1d1b"/>
  <rect x="424" y="358" width="200" height="20" rx="4" fill="rgba(245,158,11,0.08)"/>
  <text x="432" y="372" fill="#f59e0b" font-size="10" font-family="system-ui">✨ Resposta sugerida pela IA →</text>

