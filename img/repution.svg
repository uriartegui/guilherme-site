  <text x="40" y="299" text-anchor="middle" fill="#a8a6a0" font-size="11" font-family="system-ui">M</text>
  <text x="62" y="290" fill="#e5e5e0" font-size="12" font-weight="600" font-family="system-ui">Mariana Costa</text>
  <text x="62" y="306" fill="#f59e0b" font-size="12">★★★★★</text>
  <text x="300" y="290" fill="#6b6965" font-size="10" font-family="system-ui">Google · 2h atrás</text>
