<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <rect width="800" height="500" fill="#0d0c0b"/>

  <!-- Top bar -->
  <rect width="800" height="52" fill="#111010"/>
