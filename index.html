<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Guilherme Uriarte — Fullstack Developer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    --bg: #0A0908;
    --bg-2: #121110;
    --bg-3: #1A1817;
    --fg: #F5F5F0;
    --fg-dim: #A8A6A0;
    --fg-mute: #6B6965;
    --line: #232120;
    --line-2: #2E2C2A;
    --accent: #F59E0B;
    --accent-2: #EA580C;
    --radius: 18px;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{background:var(--bg); color:var(--fg); font-family:'Plus Jakarta Sans', system-ui, sans-serif; font-feature-settings:"ss01","cv11"; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;}
  body{ overflow-x:hidden; }
  ::selection{ background:var(--accent); color:#0A0908; }
  a{ color:inherit; text-decoration:none; }
  button{ font-family:inherit; cursor:pointer; border:none; background:none; color:inherit; }
  .mono{ font-family:'JetBrains Mono', ui-monospace, monospace; }

  /* scrollbar */
  ::-webkit-scrollbar{ width:10px; height:10px; }
  ::-webkit-scrollbar-track{ background:var(--bg); }
  ::-webkit-scrollbar-thumb{ background:#2a2826; border-radius:10px; }
  ::-webkit-scrollbar-thumb:hover{ background:#3a3835; }

  /* Reveal animation utility */
  .reveal{ opacity:0; transform:translateY(28px); filter:blur(3px); transition: opacity .65s cubic-bezier(.2,.7,.2,1), transform .75s cubic-bezier(.2,.7,.2,1), filter .65s ease; }
  .reveal.in{ opacity:1; transform:none; filter:blur(0px); }
  .reveal.d1{ transition-delay:.05s } .reveal.d2{ transition-delay:.12s } .reveal.d3{ transition-delay:.2s } .reveal.d4{ transition-delay:.28s } .reveal.d5{ transition-delay:.36s }

  body.no-motion .reveal{ opacity:1 !important; transform:none !important; filter:none !important; transition:none !important; }
  body.no-motion *{ animation: none !important; transition: none !important; }

  /* Custom cursor */
  body.has-custom-cursor, body.has-custom-cursor *{ cursor: none !important; }

  /* Grain texture overlay */
  .grain-layer{
    position:fixed; inset:-50%; width:200%; height:200%;
    pointer-events:none; z-index:9000; mix-blend-mode:overlay; opacity:.3;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.92 0 0 0 0 0.88 0 0 0 0 0.78 0 0 0 0.55 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    animation: grain-anim 1.2s steps(4) infinite;
  }
  .scanline{
    position:fixed; inset:0; pointer-events:none; z-index:8997; opacity:.035;
    background:repeating-linear-gradient(to bottom, transparent 0 2px, #fff 2px 3px);
  }
  body.no-motion .grain-layer{ animation:none !important; }

  @keyframes grain-anim{
    0%,100%{ transform:translate(0,0) }
    25%{ transform:translate(-3px,2px) }
    50%{ transform:translate(3px,-4px) }
    75%{ transform:translate(-2px,3px) }
  }

  /* Aurora drifting blobs in hero */
  @keyframes aurora-drift{
    0%,100%{ transform:translate(0,0) scale(1); }
    25%{ transform:translate(50px,-40px) scale(1.08); }
    50%{ transform:translate(-30px,50px) scale(0.94); }
    75%{ transform:translate(35px,25px) scale(1.04); }
  }

  /* Pulsing ring for status dots */
  @keyframes pulse-ring{
    0%{ transform:scale(1); opacity:.75; }
    100%{ transform:scale(3.8); opacity:0; }
  }

  /* Marquee strips */
  @keyframes marquee-fwd { from{ transform:translateX(0) } to{ transform:translateX(-50%) } }
  @keyframes marquee-rev { from{ transform:translateX(-50%) } to{ transform:translateX(0) } }

  /* Vignette */
  .vignette{
    position:fixed; inset:0; pointer-events:none; z-index:8998;
    background: radial-gradient(ellipse at 50% 50%, transparent 55%, rgba(0,0,0,.55) 100%);
  }

  /* Image slot styling override */
  image-slot{
    background: linear-gradient(135deg, #1a1817 25%, #15130f 25%, #15130f 50%, #1a1817 50%, #1a1817 75%, #15130f 75%);
    background-size: 14px 14px;
    border: 1px solid var(--line);
  }

  /* Modal animations */
  @keyframes fadeIn { from{ opacity:0 } to{ opacity:1 } }
  @keyframes slideUp { from{ opacity:0; transform:translateY(20px) } to{ opacity:1; transform:none } }
  @keyframes spin { to{ transform:rotate(360deg) } }

  /* Card art backgrounds */
  .card-art-1{ background: radial-gradient(circle at 80% 20%, rgba(245,158,11,.28), transparent 50%), radial-gradient(circle at 20% 80%, rgba(245,158,11,.14), transparent 55%), linear-gradient(135deg,#1a1614 0%,#0e0c0a 100%); }
  .card-art-1::after{ content:""; position:absolute; inset:0; background-image: linear-gradient(transparent 0 49.5%, rgba(245,158,11,.14) 49.5% 50%, transparent 50%), linear-gradient(90deg, transparent 0 49.5%, rgba(245,158,11,.14) 49.5% 50%, transparent 50%); background-size:70px 70px; mask-image:radial-gradient(circle at 70% 30%, #000 0%, transparent 68%); opacity:.7; }
  .card-art-2{ background: linear-gradient(135deg,#14110e 0%,#0c0a08 100%); }
  .card-art-2::after{ content:""; position:absolute; inset:0; background:repeating-linear-gradient(45deg, transparent 0 14px, rgba(237,234,227,.04) 14px 15px); mask-image:radial-gradient(circle at 30% 50%, #000 0%, transparent 70%); }
  .card-art-3{ background: radial-gradient(circle at 50% 110%, rgba(245,158,11,.2), transparent 60%), #0e0c0a; }
  .card-art-3::after{ content:""; position:absolute; left:50%; bottom:0; width:200%; height:200%; transform:translateX(-50%); background:repeating-radial-gradient(circle at 50% 100%, transparent 0 30px, rgba(245,158,11,.12) 30px 31px); }
  .card-art-4{ background: linear-gradient(180deg,#14110e 0%,#0a0908 100%); }
  .card-art-4::after{ content:""; position:absolute; inset:0; background-image:linear-gradient(transparent 0 24px, rgba(237,234,227,.045) 24px 25px); background-size:100% 25px; }
  .card-art-5{ background: linear-gradient(135deg,#12100e 0%,#0a0908 100%); overflow:hidden; }
  .card-art-5::after{ content:""; position:absolute; width:260px; height:260px; right:-40px; top:50%; transform:translateY(-50%); border:1px solid rgba(245,158,11,.25); border-radius:50%; }
  .card-art-5::before{ content:""; position:absolute; width:160px; height:160px; right:10px; top:50%; transform:translateY(-50%); border:1px solid rgba(245,158,11,.15); border-radius:50%; z-index:1; }
  .card-art-6{ background: linear-gradient(90deg,#0e0c0a,#14110e 50%,#0e0c0a); }
  .card-art-6::after{ content:""; position:absolute; inset:0; background: radial-gradient(2px 2px at 20% 30%, rgba(245,158,11,.7), transparent), radial-gradient(1px 1px at 60% 70%, rgba(237,234,227,.5), transparent), radial-gradient(1.5px 1.5px at 80% 20%, rgba(245,158,11,.5), transparent), radial-gradient(1px 1px at 40% 80%, rgba(237,234,227,.4), transparent), radial-gradient(2px 2px at 90% 50%, rgba(245,158,11,.6), transparent), radial-gradient(1px 1px at 15% 60%, rgba(237,234,227,.3), transparent), radial-gradient(2px 2px at 70% 40%, rgba(245,158,11,.4), transparent); }
  [class*="card-art-"]{ position:absolute; inset:0; }

  /* Section label expanding bar */
  .section-bar{ flex:1; height:1px; background:rgba(237,234,227,.18); transform-origin:left; transform:scaleX(0); display:block; }

  @media (max-width:900px){ .nav-clock{ display:none !important; } }
  @media (max-width:768px){
    .nav-center{ display:none !important; }
    .nav-clock{ display:none !important; }
  }

  /* Hero word lines — overflow hidden for slide-up reveal */
  .hero-line{ display:block; overflow:hidden; }
  .hero-word{ display:inline-block; will-change:transform; }

  /* Cursor mix-blend-mode difference */
  body.has-custom-cursor .cursor-ring-el{ mix-blend-mode:difference; }

</style>

<script type="application/json" id="speaker-notes">[]</script>

<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="image-slot.js"></script>
</head>

  <div id="tweaks-root"></div>
  <div class="grain-layer" aria-hidden="true"></div>
  <div class="scanline" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>

  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="demos.jsx"></script>
  <script type="text/babel" src="portfolio.jsx"></script>

</body>
</html>
